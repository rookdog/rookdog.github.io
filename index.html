<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>花卉分类识别</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js"></script>
    <style>
        * {
            text-align: center;
            font-family: Arial;
            margin-top: 20px;
        }
        img {
            max-width: 400px;
            max-height: 400px;
            margin: 20px auto;
            display: block;
            border-radius: 10px;
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #result {
            font-size: 22px;
            color: #d45e57;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>🌼 花卉分类识别模型</h1>
    <input type="file" id="imageInput" accept="image/*">
    <img id="preview">
    <div id="result">等待上传图片...</div>

    <script>
        let session;
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const result = document.getElementById('result');

        // 花卉分类标签（按你的模型修改）
        const classes = ['牵牛花' ,'雏菊', '蒲公英','荷花', '玫瑰', '向日葵', '郁金香'];

        // 加载模型
        async function loadModel() {
            try {
                session = await ort.InferenceSession.create('./best.onnx');
                result.innerText = "✅ 模型加载成功！请上传花卉图片";
            } catch (e) {
                console.error(e);
                result.innerText = "模型加载失败";
            }
        }

        // 图片预处理 + 预测
        imageInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = predict;
            preview.src = img.src;
        }

        async function predict() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 224;
            canvas.height = 224;
            ctx.drawImage(preview, 0, 0, 224, 224);

            const imageData = ctx.getImageData(0, 0, 224, 224);
            const data = Float32Array.from(imageData.data).map(x => x / 255.0);

            const input = new ort.Tensor('float32', data, [1, 3, 224, 224]);
            const output = await session.run({ input });
            const scores = output.output.data;

            let maxIndex = 0;
            for (let i = 1; i < scores.length; i++) {
                if (scores[i] > scores[maxIndex]) maxIndex = i;
            }

            result.innerText = `🌸 识别结果：${classes[maxIndex]}`;
        }

        loadModel();
    </script>
</body>
</html>
